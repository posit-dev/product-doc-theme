project:
  type: posit-docs
  render:
    - "*.qmd"
    - "!changelog.md"
  
website:
  title: 'Posit Product Documentation'
  page-navigation: true
  announcement:
    icon: info-circle
    dismissable: false
    content: "Positron is available for beta testing and [may not yet be a good fit for you](start.qmd#is-positron-for-me). If you are interested in experimenting with it, we welcome your [feedback](feedback.qmd)!"
    type: warning
    position: below-navbar
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Admin Guide"
        file: admin.qmd
      - text: "User Guide"
        file: user.qmd


    right:
      - text: "<span class='btn btn-primary'>Download</span>"
        href: download.qmd
      - icon: github
        aria-label: 'Link to Positron Github Repository'
        href: https://github.com/posit-dev/positron

  # Hybrid navigation meant to show some amount of nested sidebar navigation
  # https://quarto.org/docs/websites/website-navigation.html#hybrid-navigation
  sidebar:
    - title: "Admin Guide"
      contents:
        - admin.qmd
        - section: Subsection
          contents:
            - text: Installation
              file: install.qmd
            - text: Duplicate
              file: install.qmd

    - title: "User Guide"
      contents:
        - user.qmd
        - section: Subsection
          contents:
            - text: Sharing
              file: sharing.qmd
            - text: Duplicate
              file: sharing.qmd

  page-footer:
    left: |
      Copyright &copy; 2000-{{< env CURRENT_YEAR >}} Posit Software, PBC. All Rights Reserved.
    center: |
      Posit PRODUCT {{< env PRODUCT_VERSION >}}
    right:
      - icon: book
        href: https://docs.posit.co/guides.html
      - text: "<img alt='Link to main Posit site' src='/_extensions/posit-docs/assets/images/posit-icon-fullcolor.svg' id='footer-right-posit-logo'>"
        href: "https://posit.co/"


